<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a1628 0%, #0f2035 40%, #0a1628 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .center-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(56, 189, 248, 0.4);
      border-radius: 50%;
    }


  </style>
</head>
<body>
  <div class="container">
    <div class="grid-bg"></div>
    <div class="center-glow"></div>

    <div class="particle" style="top: 15%; left: 20%;"></div>
    <div class="particle" style="top: 25%; left: 75%;"></div>
    <div class="particle" style="top: 60%; left: 15%;"></div>
    <div class="particle" style="top: 70%; left: 80%;"></div>
    <div class="particle" style="top: 40%; left: 90%;"></div>
    <div class="particle" style="top: 80%; left: 45%;"></div>
    <div class="particle" style="top: 10%; left: 55%;"></div>
    <div class="particle" style="top: 55%; left: 35%;"></div>

    <svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="glow-strong">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <linearGradient id="line-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="line-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
        </linearGradient>

        <radialGradient id="node-grad">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#0f766e" stop-opacity="0.1"/>
        </radialGradient>
        <radialGradient id="center-node-grad">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#0d9488" stop-opacity="0.15"/>
        </radialGradient>
      </defs>

      <!-- Connection lines from center (600, 260) to outer nodes -->
      <line x1="600" y1="260" x2="380" y2="130" stroke="url(#line-grad-1)" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
      <line x1="600" y1="260" x2="820" y2="130" stroke="url(#line-grad-1)" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
      <line x1="600" y1="260" x2="920" y2="300" stroke="url(#line-grad-2)" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
      <line x1="600" y1="260" x2="870" y2="460" stroke="url(#line-grad-2)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
      <line x1="600" y1="260" x2="340" y2="360" stroke="url(#line-grad-1)" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
      <line x1="600" y1="260" x2="450" y2="460" stroke="url(#line-grad-2)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

      <!-- Secondary connections -->
      <line x1="380" y1="130" x2="340" y2="360" stroke="#14b8a6" stroke-width="0.5" opacity="0.15"/>
      <line x1="820" y1="130" x2="920" y2="300" stroke="#14b8a6" stroke-width="0.5" opacity="0.15"/>
      <line x1="920" y1="300" x2="870" y2="460" stroke="#14b8a6" stroke-width="0.5" opacity="0.12"/>
      <line x1="340" y1="360" x2="450" y2="460" stroke="#14b8a6" stroke-width="0.5" opacity="0.12"/>

      <!-- Traveling dots -->
      <circle r="3" fill="#38bdf8" filter="url(#glow)">
        <animateMotion dur="3s" repeatCount="indefinite" path="M600,260 L380,130"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="3" fill="#38bdf8" filter="url(#glow)">
        <animateMotion dur="3.5s" repeatCount="indefinite" path="M600,260 L820,130"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.5" fill="#a78bfa" filter="url(#glow)">
        <animateMotion dur="4s" repeatCount="indefinite" path="M600,260 L920,300"/>
        <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.5" fill="#38bdf8" filter="url(#glow)">
        <animateMotion dur="4.5s" repeatCount="indefinite" path="M600,260 L340,360"/>
        <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2" fill="#a78bfa" filter="url(#glow)">
        <animateMotion dur="5s" repeatCount="indefinite" path="M600,260 L870,460"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2" fill="#38bdf8" filter="url(#glow)">
        <animateMotion dur="4.2s" repeatCount="indefinite" path="M600,260 L450,460"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4.2s" repeatCount="indefinite"/>
      </circle>

      <!-- Center chat node -->
      <circle cx="600" cy="260" r="52" fill="url(#center-node-grad)" stroke="#14b8a6" stroke-width="2" filter="url(#glow-strong)"/>
      <circle cx="600" cy="260" r="62" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.3">
        <animate attributeName="r" values="62;68;62" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- Chat bubble icon -->
      <g transform="translate(600, 256)">
        <path d="M-18,-14 h36 a5,5 0 0,1 5,5 v18 a5,5 0 0,1 -5,5 h-22 l-9,9 v-9 h-5 a5,5 0 0,1 -5,-5 v-18 a5,5 0 0,1 5,-5z" 
              fill="none" stroke="#5eead4" stroke-width="2.5" opacity="0.9"/>
        <circle cx="-9" cy="-2" r="2.5" fill="#5eead4" opacity="0.8"/>
        <circle cx="0" cy="-2" r="2.5" fill="#5eead4" opacity="0.8"/>
        <circle cx="9" cy="-2" r="2.5" fill="#5eead4" opacity="0.8"/>
      </g>

      <!-- Skills node -->
      <circle cx="380" cy="130" r="34" fill="url(#node-grad)" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow)"/>
      <g transform="translate(380, 130)">
        <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,8 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" 
              fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.8"/>
      </g>


      <!-- Projects node -->
      <circle cx="820" cy="130" r="34" fill="url(#node-grad)" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow)"/>
      <g transform="translate(820, 130)">
        <path d="M-8,-10 L-14,0 L-8,10" fill="none" stroke="#5eead4" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
        <path d="M8,-10 L14,0 L8,10" fill="none" stroke="#5eead4" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
        <path d="M3,-12 L-3,12" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      </g>


      <!-- Experience node -->
      <circle cx="920" cy="300" r="30" fill="url(#node-grad)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
      <g transform="translate(920, 300)">
        <rect x="-12" y="-6" width="24" height="16" rx="2" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
        <path d="M-5,-6 L-5,-10 L5,-10 L5,-6" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
      </g>


      <!-- Contact node -->
      <circle cx="870" cy="460" r="26" fill="url(#node-grad)" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
      <g transform="translate(870, 460)">
        <rect x="-10" y="-6" width="20" height="14" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.8"/>
        <path d="M-10,-6 L0,4 L10,-6" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
      </g>


      <!-- Dialogflow CX node -->
      <circle cx="340" cy="360" r="32" fill="url(#node-grad)" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
      <g transform="translate(340, 360)">
        <circle cx="0" cy="0" r="11" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.8"/>
        <path d="M-7,-5 Q0,-12 7,-5" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.6"/>
        <path d="M-7,5 Q0,12 7,5" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.6"/>
        <line x1="0" y1="-11" x2="0" y2="11" stroke="#5eead4" stroke-width="0.8" opacity="0.4"/>
      </g>


      <!-- Background node -->
      <circle cx="450" cy="460" r="26" fill="url(#node-grad)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
      <g transform="translate(450, 460)">
        <circle cx="0" cy="-4" r="6" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
        <path d="M-10,10 Q-10,2 0,2 Q10,2 10,10" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>
      </g>


      <!-- Decorative orbit rings -->
      <circle cx="600" cy="260" r="100" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.12" stroke-dasharray="4 8"/>
      <circle cx="600" cy="260" r="160" fill="none" stroke="#14b8a6" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 12"/>
      <circle cx="600" cy="260" r="240" fill="none" stroke="#14b8a6" stroke-width="0.2" opacity="0.05" stroke-dasharray="3 15"/>
    </svg>


  </div>
</body>
</html>
